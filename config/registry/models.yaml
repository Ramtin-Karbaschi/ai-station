# AI Station Model Registry — canonical runtime aliases and profiles.
# Application code must use aliases (local-*), never raw filenames.

version: 1
runtime_policy:
  max_active_heavy_profiles: 1
  heavy_profiles:
    - general
    - coder
    - reasoning
    - vision
  always_on:
    - embedder
    - llm-gateway
  optional_profiles:
    - reranker

