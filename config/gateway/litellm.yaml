model_list:
  - model_name: local-general
    litellm_params:
      model: openai/ai-station-general
      api_base: http://llm-general:8082/v1
      api_key: "not-needed"
      timeout: 600
    model_info:
      id: local-general
      mode: chat

  - model_name: local-coder
    litellm_params:
      model: openai/ai-station-coder
      api_base: http://llm-coder:8083/v1
      api_key: "not-needed"
      timeout: 600
    model_info:
      id: local-coder
      mode: chat

  - model_name: local-reasoning
    litellm_params:
      model: openai/ai-station-reasoning
      api_base: http://llm-reasoning:8084/v1
      api_key: "not-needed"
      timeout: 600
    model_info:
      id: local-reasoning
      mode: chat

  - model_name: local-vision
    litellm_params:
      model: openai/ai-station-vision
      api_base: http://llm-vision:8085/v1
      api_key: "not-needed"
      timeout: 600
    model_info:
      id: local-vision
      mode: chat

  - model_name: local-embedding
    litellm_params:
      model: openai/ai-station-embedding
      api_base: http://embedder:8090/v1
      api_key: "not-needed"
      timeout: 120
    model_info:
      id: local-embedding
      mode: embedding

  - model_name: local-reranker
    litellm_params:
      model: openai/ai-station-reranker
      api_base: http://reranker:8091/v1
      api_key: "not-needed"
      timeout: 120
    model_info:
      id: local-reranker
      mode: rerank

litellm_settings:
  drop_params: true
  set_verbose: false
  json_logs: true
  request_timeout: 600
  num_retries: 1
  turn_off_message_logging: true
  cache: false
  disable_spend_logs: false
  disable_error_logs: false

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
  database_url: os.environ/DATABASE_URL
  store_model_in_db: false
  allow_requests_on_db_unavailable: false
  disable_spend_logs: false
  disable_master_key_return: true
  alerting: []
